services:
  backend:
    build: ./backend
    container_name: adk-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - adk-network

  frontend:
    build: ./frontend
    container_name: adk-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - adk-network

networks:
  adk-network:
    driver: bridge
